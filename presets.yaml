- id: sales
  title: "Продажи"
  summary: "Шаблон для продаж, клиентов, документов реализации и базового учета операций."
  keywords:
    - продажи
    - реализация
    - клиенты
    - договоры
    - заказы
  subsystems:
    - name: Продажи
    - name: CRM
  catalogs:
    - name: Клиенты
      synonym: Клиенты
      hierarchical: false
      attributes:
        - name: ИНН
          type: { kind: string, length: 12 }
        - name: Телефон
          type: { kind: string, length: 20 }
        - name: ЭлектроннаяПочта
          type: { kind: string, length: 80 }
        - name: КомментарийМенеджера
          multiline: true
          type: { kind: string, length: 200 }
    - name: Договоры
      synonym: Договоры с клиентами
      attributes:
        - name: Клиент
          fill_checking: ShowError
          indexing: Index
          type: { kind: catalog_ref, target: Клиенты }
        - name: ДатаНачала
          type: { kind: date, date_fractions: Date }
        - name: Активен
          type: { kind: boolean }
    - name: Номенклатура
      synonym: Номенклатура
      attributes:
        - name: Артикул
          indexing: Index
          type: { kind: string, length: 20 }
        - name: ЦенаПродажи
          type: { kind: number, precision: 12, scale: 2, non_negative: true }
        - name: ЭтоУслуга
          type: { kind: boolean }
  documents:
    - name: ЗаказКлиента
      synonym: Заказ клиента
      attributes:
        - name: Клиент
          fill_checking: ShowError
          indexing: Index
          type: { kind: catalog_ref, target: Клиенты }
        - name: Договор
          type: { kind: catalog_ref, target: Договоры }
        - name: Комментарий
          multiline: true
          extended_edit: true
          type: { kind: string, length: 200 }
        - name: СуммаДокумента
          type: { kind: number, precision: 12, scale: 2, non_negative: true }
      tabular_sections:
        - name: Товары
          attributes:
            - name: Номенклатура
              fill_checking: ShowError
              type: { kind: catalog_ref, target: Номенклатура }
            - name: Количество
              fill_checking: ShowError
              type: { kind: number, precision: 12, scale: 3, non_negative: true }
            - name: Цена
              type: { kind: number, precision: 12, scale: 2, non_negative: true }
            - name: Сумма
              type: { kind: number, precision: 12, scale: 2, non_negative: true }
    - name: Реализация
      synonym: Реализация товаров и услуг
      attributes:
        - name: Клиент
          fill_checking: ShowError
          indexing: Index
          type: { kind: catalog_ref, target: Клиенты }
        - name: Договор
          type: { kind: catalog_ref, target: Договоры }
        - name: СуммаДокумента
          type: { kind: number, precision: 12, scale: 2, non_negative: true }
      tabular_sections:
        - name: Товары
          attributes:
            - name: Номенклатура
              fill_checking: ShowError
              type: { kind: catalog_ref, target: Номенклатура }
            - name: Количество
              fill_checking: ShowError
              type: { kind: number, precision: 12, scale: 3, non_negative: true }
            - name: Цена
              type: { kind: number, precision: 12, scale: 2, non_negative: true }
            - name: Сумма
              type: { kind: number, precision: 12, scale: 2, non_negative: true }
      register_records:
        - Продажи
        - ВзаиморасчетыСКлиентами
  accumulation_registers:
    - name: Продажи
      synonym: Продажи
      register_type: Turnovers
      dimensions:
        - name: Клиент
          indexing: Index
          use_in_totals: true
          type: { kind: catalog_ref, target: Клиенты }
        - name: Номенклатура
          use_in_totals: true
          type: { kind: catalog_ref, target: Номенклатура }
      resources:
        - name: Количество
          type: { kind: number, precision: 12, scale: 3, non_negative: true }
        - name: Сумма
          type: { kind: number, precision: 12, scale: 2, non_negative: true }
    - name: ВзаиморасчетыСКлиентами
      synonym: Взаиморасчеты с клиентами
      register_type: Balance
      dimensions:
        - name: Клиент
          indexing: Index
          use_in_totals: true
          type: { kind: catalog_ref, target: Клиенты }
        - name: Договор
          use_in_totals: true
          type: { kind: catalog_ref, target: Договоры }
      resources:
        - name: Сумма
          type: { kind: number, precision: 12, scale: 2 }
  roles:
    - name: ПолныеПрава
      profile: full
    - name: МенеджерПродаж
      profile: editor
    - name: ПросмотрПродаж
      profile: viewer

